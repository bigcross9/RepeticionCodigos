<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Códigos Sagrados Agesta</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: var(--text);
        }

        /* Sidebar y Menú */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 300;
            top: 0;
            left: 0;
            background-color: var(--primary);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: #bdc3c7;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover { color: var(--white); }

        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
            cursor: pointer;
            z-index: 301;
        }

        /* App Container */
        .app-container {
            margin-top: 80px;
            width: 90%;
            max-width: 400px;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { margin: 10px 0; color: var(--primary); }

        /* Queue Info y Timer */
        #queue-info { font-size: 0.9em; color: #7f8c8d; margin-bottom: 5px; }
        
        #timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        /* Círculo de Progreso Macro */
        .progress-circle-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .progress-ring { transform: rotate(-90deg); }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform-origin: 50% 50%;
            stroke: var(--primary);
        }

        /* Barra de Taps (45 repeticiones) */
        .progress-container {
            width: 100%;
            background: #eee;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.2s;
        }

        #tap-count { font-size: 4em; font-weight: bold; margin: 20px 0; }

        .tap-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }

        .tap-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Botón Reiniciar */
        .restart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 0.7em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        /* Modales */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 500;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 85%;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
            white-space: pre-line;
        }

        .modal-content img { max-width: 100%; border-radius: 10px; }

        .modal-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="closeNav()">×</a>
        <a href="#" onclick="loadCategory('AGESTA', './static-resources/codigos.resource')">Código Sagrado Agesta</a>
        <a href="#" onclick="loadCategory('DESBLOQUEO', './static-resources/desbloqueo-codigos.resource')">Desbloqueo de Códigos</a>
        </div>

    <div class="menu-btn" onclick="openNav()">☰</div>

    <div class="app-container">
        <h2 id="current-title">Seleccione un código</h2>
        <div id="queue-info">Código 0 de 0</div>
        
        <div id="timer-display">00:00</div>

        <div class="progress-circle-container">
            <svg class="progress-ring" width="80" height="80">
                <circle stroke="#eee" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
                <circle id="progress-circle" class="progress-ring__circle" stroke-width="6" stroke-dasharray="213.6" stroke-dashoffset="213.6" fill="transparent" r="34" cx="40" cy="40"/>
            </svg>
        </div>

        <div class="progress-container">
            <div id="bar" class="progress-bar"></div>
        </div>

        <div id="tap-count">0</div>
        <button id="tap-btn" class="tap-btn" onclick="handleTap()" disabled>TAP</button>
    </div>

    <button class="restart-btn" onclick="restartToBeginning()">REINICIAR</button>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-body"></div>
            <button class="modal-btn" onclick="closeModal()">OK / EMPEZAR</button>
        </div>
    </div>

    <script>
        let codesQueue = [];
        let currentIndex = 0;
        let tapCount = 0;
        let thanksContent = null;
        let invocationText = null;
        
        // Variables de Tiempo
        let startTime = null;
        let timerInterval = null;

        const circle = document.getElementById('progress-circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        async function loadCategory(prefix, filePath) {
            closeNav();
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error("No se encontró el archivo");
                const text = await response.text();
                
                // Reiniciar estados
                codesQueue = [];
                invocationText = null;
                thanksContent = null;
                resetTimer();

                const lines = text.split('\n');
                const textMap = {};

                lines.forEach(line => {
                    if (line.includes(`${prefix}.INVOCACION.TEXTO=`)) {
                        invocationText = line.split('=')[1].replace(/\\n/g, '\n');
                    } else if (line.includes(`${prefix}.AGRADECIMIENTO=`)) {
                        thanksContent = line.split('=')[1];
                    } else if (line.includes(`${prefix}.AGESTA.`) && line.includes('.TEXTO=')) {
                        const parts = line.split('=');
                        const num = parts[0].split('.')[2];
                        textMap[num] = parts[1].replace(/\\n/g, '\n');
                    } else if (line.includes(`${prefix}.AGESTA=`)) {
                        codesQueue.push(line.split('=')[1].trim());
                    }
                });

                codesQueue = codesQueue.map(num => ({
                    number: num,
                    text: textMap[num] || null
                }));

                currentIndex = 0;
                if (invocationText) {
                    showModal(invocationText);
                } else {
                    setupCode();
                }
            } catch (e) {
                alert("Error cargando códigos: " + e.message);
            }
        }

        function setupCode() {
            if (currentIndex >= codesQueue.length) {
                finishSession();
                return;
            }
            tapCount = 0;
            updateUI();
            const current = codesQueue[currentIndex];
            if (current.text) showModal(current.text);
            document.getElementById('tap-btn').disabled = false;
        }

        function handleTap() {
            // Iniciar tiempo en el primer tap
            if (!startTime) {
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
            }

            if (tapCount < 45) {
                tapCount++;
                if (window.navigator.vibrate) window.navigator.vibrate(30);
                updateUI();
                if (tapCount === 45) {
                    setTimeout(nextCode, 500);
                }
            }
        }

        function nextCode() {
            currentIndex++;
            if (currentIndex < codesQueue.length) {
                setupCode();
            } else {
                finishSession();
            }
        }

        function updateUI() {
            document.getElementById('tap-count').innerText = tapCount;
            document.getElementById('bar').style.width = (tapCount / 45 * 100) + "%";
            
            const total = codesQueue.length;
            const displayIdx = total > 0 ? currentIndex + 1 : 0;
            document.getElementById('queue-info').innerText = `Código ${displayIdx} de ${total}`;
            document.getElementById('current-title').innerText = codesQueue[currentIndex]?.number || "Agesta";

            // Actualizar círculo de progreso macro
            const progressPercent = total > 0 ? (currentIndex / total) : 0;
            const offset = circumference - (progressPercent * circumference);
            circle.style.strokeDashoffset = offset;
        }

        // Lógica del Temporizador
        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const mins = Math.floor(diff / 60).toString().padStart(2, '0');
            const secs = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${mins}:${secs}`;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            startTime = null;
            document.getElementById('timer-display').innerText = "00:00";
        }

        function restartToBeginning() {
            resetTimer();
            currentIndex = 0;
            setupCode();
        }

        function finishSession() {
            clearInterval(timerInterval);
            if (thanksContent) {
                if (thanksContent.toLowerCase().endsWith('.jpg') || thanksContent.toLowerCase().endsWith('.png')) {
                    showModal(`<img src="./static-resources/${thanksContent}">`, true);
                } else {
                    showModal(thanksContent.replace(/\\n/g, '\n'), true);
                }
            } else {
                alert("Sesión finalizada. ¡Gracias!");
                location.reload();
            }
        }

        function showModal(content, isFinal = false) {
            const body = document.getElementById('modal-body');
            body.innerHTML = content;
            document.getElementById('modal-overlay').style.display = 'flex';
            if (isFinal) {
                window.isFinalState = true;
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            if (window.isFinalState) {
                location.reload();
            } else if (codesQueue.length > 0 && tapCount === 0) {
                // Si cerramos el modal de inicio o de un código nuevo
                updateUI();
            }
        }
    </script>
</body>
</html>
