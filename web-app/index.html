<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Códigos Sagrados Pro</title>
    <style>
        :root { --primary: #007bff; --dark: #333; --success: #4caf50; --accent: #6f42c1; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 1rem; display: flex; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box; }
        
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: var(--dark); color: white; transition: 0.3s; z-index: 300; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: white; text-decoration: none; border-bottom: 1px solid #444; cursor: pointer; }
        
        /* Modal System */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 500; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; max-width: 500px; width: 100%; text-align: left; max-height: 90vh; overflow-y: auto; }
        .modal-text { font-size: 1.1rem; line-height: 1.6; white-space: pre-line; margin-bottom: 20px; border-left: 5px solid var(--accent); padding-left: 15px; }
        
        /* Modal Imagen Agradecimiento */
        .img-full { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; object-fit: contain; }

        .main-content { padding: 100px 20px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 380px; }
        
        #progress-container { width: 100%; background: #e0e0e0; border-radius: 10px; margin: 20px 0; height: 15px; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.2s; border-radius: 10px; }
        
        button { padding: 20px; font-size: 1.5rem; cursor: pointer; border: none; border-radius: 12px; background: var(--primary); color: white; width: 100%; }
        button:disabled { background: #ccc; color: #888; }
        
        .btn-restart { position: fixed; bottom: 20px; right: 20px; background: var(--danger); color: white; border: none; border-radius: 50px; padding: 12px 20px; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>

    <header>
        <div onclick="toggleMenu()" style="cursor:pointer; padding:10px; font-size: 1.5rem;">☰</div>
        <span style="margin-left: 10px;">Códigos Sagrados</span>
    </header>

    <nav class="sidebar" id="sidebar">
        <a onclick="loadCategory('CODIGO.AGESTA', './static-resources/codigos.resource')">Código Sagrado Agesta</a>
        <a onclick="loadCategory('DESBLOQUEO', './static-resources/desbloqueo-codigos.resource')">Desbloqueo de Códigos</a>
        <a onclick="loadCategory('CODIGO.DINERO')">Flujo de Dinero</a>
    </nav>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content" id="modal-container">
            <div id="modal-body"></div>
            <button onclick="closeModal()" id="modal-close-btn" style="background: var(--primary); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold; margin-top: 10px;">OK</button>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h3 id="category-name">Selecciona categoría</h3>
            <h1 id="code-value">---</h1>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <button id="tap-btn" onclick="handleTap()" disabled>TAP</button>
            <p id="counter-text" style="display:none;">Repeticiones: 0 / 45</p>
            <p id="queue-info" style="font-size: 0.8rem; color: #666; margin-top: 10px;">Menú -> Elegir categoría</p>
        </div>
    </div>

    <button class="btn-restart" onclick="restartToBeginning()">Reiniciar</button>

    <script>
        let codesQueue = [];
        let textsMap = {};
        let thanksImage = "";
        let currentCodeIndex = 0;
        let tapCount = 0;
        let activePrefix = ""; 
        const GOAL = 45;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        // En el script de tu index.html, actualiza la función
async function loadCategory(prefix, resourcePath) { // <--- Nuevo parámetro resourcePath
    activePrefix = prefix;
    if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
    
    // Si no se proporciona ruta, usamos la por defecto (para CRAYON y DINERO)
    const finalPath = resourcePath || './static-resources/codigos.resource';
    console.log("Cargando categoría:", prefix, "desde:", finalPath);

    try {
        const response = await fetch(finalPath); // <--- Usamos la ruta dinámica
        if (!response.ok) throw new Error("No se pudo encontrar el archivo de recursos");
        // ... resto de tu lógica de parsing sin cambios ...
                const text = await response.text();
                const lines = text.split(/\r?\n/);

                codesQueue = [];
                textsMap = {};
                thanksImage = "";

                lines.forEach(line => {
                    const upperLine = line.toUpperCase();
                    if (upperLine.includes('.TEXTO=')) {
                        const parts = line.split('.TEXTO=');
                        const key = parts[0].split('.').pop().trim();
                        textsMap[key] = parts[1].trim().replace(/\\n/g, '\n');
                    } else if (upperLine.includes('.AGRADECIMIENTO=')) {
                        // Capturamos la imagen si coincide con la categoría actual
                        if(upperLine.startsWith(prefix.toUpperCase())) {
                            thanksImage = line.split('=')[1].trim();
                        }
                    } else if (upperLine.startsWith(prefix.toUpperCase()) && line.includes('=')) {
                        codesQueue.push(line.split('=')[1].trim());
                    }
                });

                if (codesQueue.length > 0) {
                    currentCodeIndex = 0;
                    setupCode();
                }
            } catch (e) { alert("Error al cargar recursos"); }
        }

        function setupCode() {
            const currentCode = codesQueue[currentCodeIndex];
            const textToDisplay = textsMap[currentCode];

            document.getElementById('code-value').innerText = currentCode;
            document.getElementById('category-name').innerText = "Código Sagrado:";
            document.getElementById('queue-info').innerText = `Código ${currentCodeIndex + 1} de ${codesQueue.length}`;
            
            tapCount = 0;
            updateDisplay();

            if (textToDisplay) {
                openModal(textToDisplay, 'text');
            } else {
                startCounting();
            }
        }

        function openModal(content, type) {
            const body = document.getElementById('modal-body');
            body.innerHTML = '';
            
            if (type === 'text') {
                const div = document.createElement('div');
                div.className = 'modal-text';
                div.innerText = content;
                body.appendChild(div);
                document.getElementById('modal-close-btn').innerText = "OK - COMENZAR";
            } else if (type === 'image') {
                const img = document.createElement('img');
                img.src = `./static-resources/${content}`;
                img.className = 'img-full';
                body.appendChild(img);
                document.getElementById('modal-close-btn').innerText = "OK - FINALIZAR";
            }
            
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('tap-btn').disabled = true;
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            // Si estábamos en modo imagen, ya terminamos todo
            if (document.getElementById('modal-close-btn').innerText.includes("FINALIZAR")) {
                location.reload(); // Reinicio estoico total
            } else {
                startCounting();
            }
        }

        function startCounting() {
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('counter-text').style.display = 'block';
            document.getElementById('tap-btn').disabled = false;
        }

        function handleTap() {
            tapCount++;
            if (tapCount >= GOAL) {
                nextCode();
            } else {
                updateDisplay();
            }
        }

        function restartToBeginning() {
            if (activePrefix) {
                currentCodeIndex = 0;
                setupCode();
            }
        }

        function nextCode() {
    currentCodeIndex++;
    if (currentCodeIndex < codesQueue.length) {
        setupCode();
    } else {
        if (thanksImage) {
            // Verificamos si es un archivo de imagen o solo texto
            const isImage = /\.(jpg|jpeg|png|gif)$/i.test(thanksImage);
            if (isImage) {
                openModal(thanksImage, 'image');
            } else {
                // Si no tiene extensión de imagen, lo tratamos como texto de cierre
                openModal(thanksImage.replace(/\\n/g, '\n'), 'text');
                // Cambiamos el botón para que diga que ya terminó todo
                document.getElementById('modal-close-btn').innerText = "OK - FINALIZAR";
            }
        } else {
            alert("¡Has terminado todos los códigos!");
            location.reload();
        }
    }
}

        function updateDisplay() {
            document.getElementById('counter-text').innerText = `Repeticiones: ${tapCount} / ${GOAL}`;
            const percentage = (tapCount / GOAL) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }
    </script>
</body>
</html>
