<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigos Sagrados App</title>
    <style>
        :root { --primary: #007bff; --dark: #333; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; background: #f0f2f5; }
        
        /* Header y Hamburguesa */
        header { background: var(--primary); color: white; padding: 1rem; display: flex; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; }
        .menu-btn { cursor: pointer; font-size: 1.5rem; margin-right: 1rem; display: flex; flex-direction: column; gap: 5px; }
        .menu-btn div { width: 25px; height: 3px; background: white; border-radius: 2px; }

        /* Sidebar (Menú oculto) */
        .sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: var(--dark); color: white; transition: 0.3s; z-index: 200; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: white; text-decoration: none; border-bottom: 1px solid #444; font-size: 0.9rem; }
        .sidebar a:hover { background: #444; }

        /* Overlay para cerrar el menú */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; }
        .overlay.active { display: block; }

        /* Contenido Principal */
        .main-content { padding: 80px 20px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        
        /* Barra de Progreso */
        #progress-container { width: 100%; background: #e0e0e0; border-radius: 10px; margin: 20px 0; height: 20px; }
        #progress-bar { width: 0%; height: 100%; background: #4caf50; transition: width 0.3s; border-radius: 10px; }
        
        button { padding: 15px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; background: var(--primary); color: white; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
        <span>Códigos Sagrados</span>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <a href="#" onclick="selectOption('Código Sagrado Crayon')">Código Sagrado Crayon</a>
        <a href="#" onclick="selectOption('Desbloqueo de Códigos Sagrados')">Desbloqueo de Códigos</a>
        <a href="#" onclick="selectOption('Flujo de Dinero')">Flujo de Dinero</a>
    </nav>

    <div class="main-content">
        <div class="card">
            <h2 id="title">Selecciona una opción</h2>
            <h1 id="counter">0</h1>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <button onclick="increment()">¡Tap!</button>
            <p>Meta: 45 repeticiones</p>
        </div>
    </div>

    <script>
        let count = 0;
        const goal = 45; // Los códigos sagrados suelen repetirse 45 veces
        
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function selectOption(option) {
            document.getElementById('title').innerText = option;
            resetCounter();
            toggleMenu();
        }

        function increment() {
            if (count < goal) {
                count++;
                updateDisplay();
            }
        }

        function resetCounter() {
            count = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('counter').innerText = count;
            const percentage = (count / goal) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }
    </script>
</body>
</html>
