<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Códigos Sagrados Pro</title>
    <style>
        :root { --primary: #007bff; --dark: #333; --success: #4caf50; --accent: #6f42c1; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--primary); color: white; padding: 1rem; display: flex; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box; }
        
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: var(--dark); color: white; transition: 0.3s; z-index: 300; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: white; text-decoration: none; border-bottom: 1px solid #444; cursor: pointer; }
        
        /* Modal System */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 500; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; max-width: 500px; width: 100%; text-align: left; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-text { font-size: 1.1rem; line-height: 1.6; white-space: pre-line; margin-bottom: 20px; border-left: 5px solid var(--accent); padding-left: 15px; color: var(--dark); }
        
        .img-full { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; object-fit: contain; }

        .main-content { padding: 100px 20px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 380px; position: relative; }
        
        /* Nuevos Elementos: Timer y Círculo Macro */
        .macro-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        #session-timer { font-family: monospace; font-weight: bold; font-size: 1.2rem; color: var(--dark); }
        
        .progress-ring { transform: rotate(-90deg); }
        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform-origin: 50% 50%; stroke: var(--accent); }

        #progress-container { width: 100%; background: #e0e0e0; border-radius: 10px; margin: 20px 0; height: 15px; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.2s; border-radius: 10px; }
        
        button#tap-btn { padding: 20px; font-size: 1.5rem; cursor: pointer; border: none; border-radius: 12px; background: var(--primary); color: white; width: 100%; touch-action: manipulation; transition: 0.2s; }
        button#tap-btn:disabled { background: #ccc; color: #888; cursor: not-allowed; }
        button#tap-btn:active { transform: scale(0.98); }
        
        .btn-restart { position: fixed; bottom: 20px; right: 20px; background: var(--danger); color: white; border: none; border-radius: 50px; padding: 12px 20px; font-weight: bold; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }

        .info { font-size: 0.8rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div onclick="toggleMenu()" style="cursor:pointer; padding:10px; font-size: 1.5rem;">☰</div>
        <span style="margin-left: 10px;">Códigos Sagrados</span>
    </header>

    <nav class="sidebar" id="sidebar">
        <a onclick="loadCategory('CODIGO.AGESTA', './static-resources/codigos.resource')">Código Sagrado AGESTA</a>
        <a onclick="loadCategory('DESBLOQUEO', './static-resources/desbloqueo-codigos.resource')">Desbloqueo de Códigos</a>
        <a onclick="loadCategory('CODIGO.DINERO', './static-resources/codigos.resource')">Flujo de Dinero</a>
    </nav>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content" id="modal-container">
            <div id="modal-body"></div>
            <button onclick="closeModal()" id="modal-close-btn" style="background: var(--primary); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold; margin-top: 10px; cursor: pointer;">OK</button>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h3 id="category-name">Selecciona categoría</h3>
            
            <div class="macro-container">
                <svg class="progress-ring" width="60" height="60">
                    <circle stroke="#e0e0e0" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                    <circle id="macro-circle" class="progress-ring__circle" stroke-width="4" stroke-dasharray="163.36" stroke-dashoffset="163.36" fill="transparent" r="26" cx="30" cy="30"/>
                </svg>
                <div id="session-timer">00:00</div>
            </div>

            <h1 id="code-value">---</h1>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <button id="tap-btn" onclick="handleTap()" disabled>TAP</button>
            <p id="counter-text" style="display:none;">Repeticiones: 0 / 45</p>
            <p id="queue-info" class="info">Menú -> Elegir categoría</p>
        </div>
    </div>

    <button class="btn-restart" onclick="restartToBeginning()">Reiniciar</button>

    <script>
        let codesQueue = [];
        let textsMap = {};
        let thanksContent = "";
        let currentCodeIndex = 0;
        let tapCount = 0;
        let activePrefix = "";
        let activePath = "";
        let pendingInvocacion = "";
        const GOAL = 45;

        // Variables de Tiempo y Macro Progreso
        let startTime = null;
        let timerInterval = null;
        const macroCircle = document.getElementById('macro-circle');
        const circumference = 26 * 2 * Math.PI;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        async function loadCategory(prefix, resourcePath) {
            activePrefix = prefix;
            activePath = resourcePath;
            toggleMenu();
            resetSessionState();
            
            try {
                const response = await fetch(resourcePath);
                if (!response.ok) throw new Error("No se pudo cargar el archivo");
                const text = await response.text();
                const lines = text.split(/\r?\n/);

                lines.forEach(line => {
                    const upperLine = line.toUpperCase();
                    if (upperLine.includes('.INVOCACION.TEXTO=')) {
                        pendingInvocacion = line.split('=')[1].trim().replace(/\\n/g, '\n');
                    } 
                    else if (upperLine.includes('.TEXTO=')) {
                        const parts = line.split('.TEXTO=');
                        const key = parts[0].split('.').pop().trim();
                        textsMap[key] = parts[1].trim().replace(/\\n/g, '\n');
                    } 
                    else if (upperLine.includes('.AGRADECIMIENTO=')) {
                        if(upperLine.startsWith(prefix.toUpperCase())) {
                            thanksContent = line.split('=')[1].trim();
                        }
                    } 
                    else if (upperLine.startsWith(prefix.toUpperCase()) && line.includes('=')) {
                        codesQueue.push(line.split('=')[1].trim());
                    }
                });

                if (codesQueue.length > 0) {
                    currentCodeIndex = 0;
                    if (pendingInvocacion) {
                        openModal(pendingInvocacion, 'text');
                        document.getElementById('modal-close-btn').innerText = "OK - COMENZAR";
                        prepareFirstCodeSilent();
                    } else {
                        setupCode();
                    }
                }
            } catch (e) { alert("Error: " + e.message); }
        }

        function resetSessionState() {
            clearInterval(timerInterval);
            startTime = null;
            document.getElementById('session-timer').innerText = "00:00";
            macroCircle.style.strokeDashoffset = circumference;
            codesQueue = [];
            textsMap = {};
            thanksContent = "";
            pendingInvocacion = "";
        }

        function prepareFirstCodeSilent() {
            const currentCode = codesQueue[0];
            document.getElementById('code-value').innerText = currentCode;
            document.getElementById('category-name').innerText = "Código Activo:";
            document.getElementById('queue-info').innerText = `Código 1 de ${codesQueue.length}`;
            tapCount = 0;
            updateDisplay();
            updateMacroProgress();
        }

        function setupCode() {
            const currentCode = codesQueue[currentCodeIndex];
            const textToDisplay = textsMap[currentCode];

            document.getElementById('code-value').innerText = currentCode;
            document.getElementById('category-name').innerText = "Código Activo:";
            document.getElementById('queue-info').innerText = `Código ${currentCodeIndex + 1} de ${codesQueue.length}`;
            
            tapCount = 0;
            updateDisplay();
            updateMacroProgress();

            if (textToDisplay) {
                openModal(textToDisplay, 'text');
                document.getElementById('modal-close-btn').innerText = "OK - CONTAR";
            } else {
                startCounting();
            }
        }

        function handleTap() {
            // Iniciar temporizador al primer tap
            if (!startTime) {
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
            }

            tapCount++;
            if (tapCount >= GOAL) {
                nextCode();
            } else {
                updateDisplay();
            }
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('session-timer').innerText = `${m}:${s}`;
        }

        function updateMacroProgress() {
            const total = codesQueue.length;
            if (total === 0) return;
            // El progreso macro depende de cuántos códigos de la lista hemos completado
            const progress = currentCodeIndex / total;
            const offset = circumference - (progress * circumference);
            macroCircle.style.strokeDashoffset = offset;
        }

        function restartToBeginning() {
            if (activePrefix) {
                resetSessionState();
                // Re-ejecutamos la carga para limpiar todo e iniciar de cero
                loadCategory(activePrefix, activePath);
            }
        }

        function nextCode() {
            currentCodeIndex++;
            if (currentCodeIndex < codesQueue.length) {
                setupCode();
            } else {
                // Al finalizar, el círculo se llena al 100%
                macroCircle.style.strokeDashoffset = 0;
                clearInterval(timerInterval);
                
                if (thanksContent) {
                    const isImage = /\.(jpg|jpeg|png|gif)$/i.test(thanksContent);
                    openModal(thanksContent.replace(/\\n/g, '\n'), isImage ? 'image' : 'text');
                    document.getElementById('modal-close-btn').innerText = "OK - FINALIZAR";
                } else {
                    alert("¡Fin de la lista!");
                    location.reload();
                }
            }
        }

        function updateDisplay() {
            document.getElementById('counter-text').innerText = `Repeticiones: ${tapCount} / ${GOAL}`;
            const percentage = (tapCount / GOAL) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        // --- Funciones de UI del código base ---
        function openModal(content, type) {
            const body = document.getElementById('modal-body');
            body.innerHTML = '';
            if (type === 'text') {
                const div = document.createElement('div');
                div.className = 'modal-text';
                div.innerText = content;
                body.appendChild(div);
            } else if (type === 'image') {
                const img = document.createElement('img');
                img.src = `./static-resources/${content}`;
                img.className = 'img-full';
                body.appendChild(img);
            }
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('tap-btn').disabled = true;
        }

        function closeModal() {
            const btnText = document.getElementById('modal-close-btn').innerText;
            document.getElementById('modal-overlay').style.display = 'none';
            if (btnText.includes("FINALIZAR")) {
                location.reload();
            } else {
                startCounting();
            }
        }

        function startCounting() {
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('counter-text').style.display = 'block';
            document.getElementById('tap-btn').disabled = false;
        }
    </script>
</body>
</html>
