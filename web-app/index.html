<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Códigos Sagrados Agesta</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; --text: #333; --white: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); margin: 0; display: flex; flex-direction: column;
            align-items: center; height: 100vh; color: var(--text); overflow: hidden;
        }
        /* Sidebar */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 300; top: 0; left: 0; background-color: var(--primary); overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: #bdc3c7; display: block; transition: 0.3s; }
        .sidebar a:hover { color: var(--white); }
        .menu-btn { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 301; }

        /* App Container */
        .app-container { margin-top: 80px; width: 90%; max-width: 400px; background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { margin: 10px 0; color: var(--primary); min-height: 1.2em; }
        #queue-info { font-size: 0.9em; color: #7f8c8d; margin-bottom: 5px; }
        #timer-display { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: var(--primary); font-size: 1.1em; margin-bottom: 10px; }

        /* Círculo de Progreso Macro */
        .progress-circle-container { display: flex; justify-content: center; margin: 10px 0; }
        .progress-ring { transform: rotate(-90deg); }
        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform-origin: 50% 50%; stroke: var(--primary); }

        /* Barra de Taps */
        .progress-container { width: 100%; background: #eee; height: 12px; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3498db, #2ecc71); transition: width 0.2s; }

        #tap-count { font-size: 4em; font-weight: bold; margin: 10px 0; color: var(--primary); }
        .tap-btn { width: 100%; padding: 20px; font-size: 1.5em; border: none; border-radius: 10px; background: var(--primary); color: white; cursor: pointer; touch-action: manipulation; }
        .tap-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .restart-btn { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 0.7em; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: bold; z-index: 200; }

        /* Modales */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 500; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; padding: 25px; border-radius: 15px; text-align: center; max-height: 80vh; overflow-y: auto; white-space: pre-line; }
        .modal-content img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
        .modal-btn { margin-top: 20px; padding: 12px 30px; background: var(--primary); color: white; border-radius: 8px; border: none; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
