<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Códigos Sagrados Pro</title>
    <style>
        :root { --primary: #007bff; --dark: #333; --success: #4caf50; --accent: #6f42c1; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 1rem; display: flex; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: var(--dark); color: white; transition: 0.3s; z-index: 300; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: white; text-decoration: none; border-bottom: 1px solid #444; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 500; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; max-width: 500px; width: 100%; text-align: left; }
        .modal-text { font-size: 1.1rem; line-height: 1.6; white-space: pre-line; margin-bottom: 20px; border-left: 5px solid var(--accent); padding-left: 15px; }
        .main-content { padding: 100px 20px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 380px; }
        #progress-container { width: 100%; background: #e0e0e0; border-radius: 10px; margin: 20px 0; height: 15px; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.2s; border-radius: 10px; }
        button { padding: 20px; font-size: 1.5rem; cursor: pointer; border: none; border-radius: 12px; background: var(--primary); color: white; width: 100%; }
        button:disabled { background: #ccc; color: #888; }
        .btn-restart { position: fixed; bottom: 20px; right: 20px; background: var(--danger); color: white; border: none; border-radius: 50px; padding: 12px 20px; z-index: 100; }
    </style>
</head>
<body>

    <header>
        <div onclick="toggleMenu()" style="cursor:pointer; padding:10px; font-size: 1.5rem;">☰</div>
        <span style="margin-left: 10px;">Códigos Sagrados</span>
    </header>

    <nav class="sidebar" id="sidebar">
        <a onclick="loadCategory('CODIGO.CRAYON')">Código Sagrado Crayon</a>
        <a onclick="loadCategory('CODIGO.DESBLOQUEO')">Desbloqueo de Códigos</a>
        <a onclick="loadCategory('CODIGO.DINERO')">Flujo de Dinero</a>
    </nav>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-text" id="modal-text-content"></div>
            <button onclick="closeModalAndStart()" style="background: var(--primary); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold;">OK - COMENZAR</button>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h3 id="category-name">Selecciona categoría</h3>
            <h1 id="code-value">---</h1>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <button id="tap-btn" onclick="handleTap()" disabled>TAP</button>
            <p id="counter-text" style="display:none;">Repeticiones: 0 / 45</p>
            <p id="queue-info" style="font-size: 0.8rem; color: #666; margin-top: 10px;">Abre el menú para empezar</p>
        </div>
    </div>

    <button class="btn-restart" onclick="restartCurrentCode()">Reiniciar</button>

    <script>
        let codesQueue = [];
        let textsMap = {};
        let currentCodeIndex = 0;
        let tapCount = 0;
        const GOAL = 45;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        async function loadCategory(prefix) {
            console.log("Cargando categoría:", prefix);
            toggleMenu();
            
            // Ruta relativa. Asegúrate que static-resources esté al mismo nivel que index.html
            const resourcePath = './static-resources/codigos.resource';
            
            try {
                const response = await fetch(resourcePath);
                if (!response.ok) throw new Error("No se pudo encontrar el archivo .resource");
                
                const text = await response.text();
                const lines = text.split(/\r?\n/); // Maneja saltos de línea Windows y Linux

                codesQueue = [];
                textsMap = {};

                lines.forEach(line => {
                    if (line.toUpperCase().includes('.TEXTO=')) {
                        const parts = line.split('.TEXTO=');
                        const key = parts[0].split('.').pop().trim();
                        textsMap[key] = parts[1].trim().replace(/\\n/g, '\n');
                    } else if (line.toUpperCase().startsWith(prefix.toUpperCase()) && line.includes('=')) {
                        const val = line.split('=')[1].trim();
                        codesQueue.push(val);
                    }
                });

                if (codesQueue.length > 0) {
                    currentCodeIndex = 0;
                    setupCode();
                } else {
                    alert("No se encontraron códigos para: " + prefix);
                }
            } catch (e) {
                console.error("Error de Fetch:", e);
                alert("Error crítico: " + e.message + "\nRevisa la ruta: " + resourcePath);
            }
        }

        function setupCode() {
            const currentCode = codesQueue[currentCodeIndex];
            const textToDisplay = textsMap[currentCode];

            document.getElementById('code-value').innerText = currentCode;
            document.getElementById('category-name').innerText = "Código Activo:";
            document.getElementById('queue-info').innerText = `Código ${currentCodeIndex + 1} de ${codesQueue.length}`;
            
            tapCount = 0;
            updateDisplay();

            if (textToDisplay) {
                document.getElementById('modal-text-content').innerText = textToDisplay;
                document.getElementById('modal-overlay').style.display = 'flex';
                document.getElementById('tap-btn').disabled = true;
            } else {
                startCounting();
            }
        }

        function closeModalAndStart() {
            document.getElementById('modal-overlay').style.display = 'none';
            startCounting();
        }

        function startCounting() {
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('counter-text').style.display = 'block';
            document.getElementById('tap-btn').disabled = false;
            document.getElementById('tap-btn').innerText = "TAP";
        }

        function handleTap() {
            tapCount++;
            if (tapCount >= GOAL) {
                nextCode();
            } else {
                updateDisplay();
            }
        }

        function restartCurrentCode() {
            if (codesQueue.length > 0) setupCode();
        }

        function nextCode() {
            currentCodeIndex++;
            if (currentCodeIndex < codesQueue.length) {
                setupCode();
            } else {
                document.getElementById('code-value').innerText = "¡FIN!";
                document.getElementById('tap-btn').disabled = true;
                document.getElementById('progress-container').style.display = 'none';
                document.getElementById('counter-text').style.display = 'none';
                document.getElementById('queue-info').innerText = "Lista completada";
            }
        }

        function updateDisplay() {
            document.getElementById('counter-text').innerText = `Repeticiones: ${tapCount} / ${GOAL}`;
            const percentage = (tapCount / GOAL) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }
    </script>
</body>
</html>
